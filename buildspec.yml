version: 0.2

env:
  variables:
    IMAGE_NAME: test-demo
    IMAGE_TAG: $CODEBUILD_RESOLVED_SOURCE_VERSION

phases:
  pre_build:
    commands:
      - echo "开始前置准备，仅本地构建，不推送ECR"
  build:
    commands:
      - echo "本地构建镜像"
      - docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .
      - echo "查看本地镜像列表"
      - docker images
  post_build:
    commands:
      # 构建完成直接删除本地镜像，释放构建实例磁盘
      - echo "清理本地构建镜像"
      - docker rmi ${IMAGE_NAME}:${IMAGE_TAG}
      - echo "流水线结束，无任何镜像留存、无ECR开销"

artifacts:
  files:
    - '**/*'
